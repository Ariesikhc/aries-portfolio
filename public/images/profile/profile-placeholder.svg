<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#310A69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D41414;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGradient)"/>
  
  <!-- Profile Circle -->
  <circle cx="200" cy="140" r="70" fill="#F5F5F5" opacity="0.1"/>
  
  <!-- Initials as placeholder -->
  <text x="200" y="160" font-size="80" font-weight="bold" fill="#D41414" text-anchor="middle" font-family="Arial, sans-serif">AI</text>
  
  <!-- Bottom Info -->
  <rect y="280" width="400" height="120" fill="#000000" opacity="0.3"/>
  <text x="200" y="320" font-size="28" font-weight="bold" fill="#F5F5F5" text-anchor="middle" font-family="Arial, sans-serif">Aries Ikhciar</text>
  <text x="200" y="350" font-size="16" fill="#D41414" text-anchor="middle" font-family="Arial, sans-serif">Creative Designer</text>
</svg>